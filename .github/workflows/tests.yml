name: tests

# windows-latest matches the fleet's primary platform.
on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pytest
      - run: python -m pytest tests -q
  skill-lint:
    # doodle-lint over this repo's skills. Gate on errors only for now
    # (exit 2+); pre-existing warnings are tracked in the fleet inbox.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install doodle-lint
      - run: |
          doodle skills
          if ($LASTEXITCODE -ge 2) { exit $LASTEXITCODE } else { exit 0 }
